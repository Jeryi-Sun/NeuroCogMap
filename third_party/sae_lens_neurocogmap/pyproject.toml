[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "sae-lens-neurocogmap"
version = "5.11.0.post1"
description = "NeuroCogMap-local patched SAELens package."
readme = "README.md"
requires-python = ">=3.10,<4.0"
license = { text = "MIT" }
authors = [
  { name = "SAELens contributors" },
  { name = "NeuroCogMap release maintainers" },
]
dependencies = [
  "automated-interpretability>=0.0.5,<1.0.0",
  "babe>=0.0.7,<0.0.8",
  "datasets>=2.17.1,<3.0.0",
  "matplotlib>=3.8.3,<4.0.0",
  "matplotlib-inline>=0.1.6,<0.2.0",
  "nltk>=3.8.1,<4.0.0",
  "plotly>=5.19.0,<6.0.0",
  "plotly-express>=0.4.1,<0.5.0",
  "python-dotenv>=1.0.1,<2.0.0",
  "pyyaml>=6.0.1,<7.0.0",
  "safetensors>=0.4.2,<0.5.0",
  "simple-parsing>=0.1.6,<0.2.0",
  "transformer-lens>=2.0.0,<3.0.0",
  "transformers>=4.38.1,<5.0.0",
  "typer>=0.12.3,<0.13.0",
  "typing-extensions>=4.10.0,<5.0.0",
  "zstandard>=0.22.0,<0.23.0",
]

[tool.setuptools]
include-package-data = true

[tool.setuptools.packages.find]
where = ["."]
include = ["sae_lens*"]

[tool.setuptools.package-data]
sae_lens = ["pretrained_saes.yaml"]
